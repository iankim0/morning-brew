name: Morning Rundown

on:
  schedule:
    - cron: "40 5 * * *"  # 5:40 AM Eastern — off-the-hour intentionally, gives ~20 min cushion before 6 AM
  workflow_dispatch: {}    # always keep: manual trigger for testing and recovery

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Generate rundown
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python rundown.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - id: deploy
        uses: actions/deploy-pages@v4
